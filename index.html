<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>things to do</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen bg-bg text-ink font-sans antialiased selection:bg-accentSoft selection:text-ink">

  <!-- these classes are applied by JS so Tailwind needs to see them here to generate the CSS -->
  <span class="hidden text-danger text-warn text-muted opacity-60 inline-flex cycling picked"></span>

  <svg width="0" height="0" class="absolute" aria-hidden="true">
    <defs>
      <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="i-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12.5l4.5 4.5L19 7" />
      </symbol>
      <symbol id="i-trash" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path
          d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13M10 11v7M14 11v7" />
      </symbol>
      <symbol id="i-calendar" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="5" width="17" height="16" rx="2" />
        <path d="M3.5 10h17M8 3v4M16 3v4" />
      </symbol>
      <symbol id="i-sound-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6h4l5 4V5L8 9H4z" />
        <path d="M16 8.5a5 5 0 0 1 0 7M19 6a8 8 0 0 1 0 12" />
      </symbol>
      <symbol id="i-sound-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 9v6h4l5 4V5L8 9H4z" />
        <path d="M17 9l5 6M22 9l-5 6" />
      </symbol>
      <symbol id="i-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M5 12h14M13 6l6 6-6 6" />
      </symbol>
      <symbol id="i-empty" viewBox="0 0 120 90" fill="none" stroke="currentColor" stroke-width="1.4"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="18" y="14" width="84" height="62" rx="6" />
        <path d="M30 30h60M30 42h44M30 54h36" opacity=".5" />
        <circle cx="86" cy="60" r="9" />
        <path d="M82 60l3 3 5-6" />
      </symbol>
      <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9" />
        <path d="M12 7v5l3 2" />
      </symbol>
      <symbol id="i-shuffle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M16 3h5v5M4 20L21 3M16 21h5v-5M4 4l5 5" />
      </symbol>
    </defs>
  </svg>

  <main class="mx-auto w-full max-w-xl px-4 sm:px-6 py-10 sm:py-16">

    <div class="flex items-center justify-between text-xs sm:text-sm text-muted mb-10">
      <time id="today" class="tracking-wide uppercase"></time>
      <button id="sound-toggle"
        class="grid place-items-center w-9 h-9 rounded-full text-muted hover:text-ink hover:bg-subtle/60 transition"
        aria-label="Toggle completion sound">
        <svg class="w-[18px] h-[18px]">
          <use href="#i-sound-on" />
        </svg>
      </button>
    </div>

    <header class="mb-8">
      <h1 class="text-4xl sm:text-5xl tracking-tight leading-none">
        things <span class="font-serif italic text-accent">to do</span>
      </h1>
      <p id="counter" class="mt-3 text-sm text-muted" aria-live="polite">
        nothing yet — write something below
      </p>
    </header>

    <form id="add-form" class="relative" autocomplete="off">
      <div
        class="flex items-center gap-2 rounded-2xl bg-card border border-subtle shadow-soft px-3 sm:px-4 py-2.5 focus-within:shadow-ring focus-within:border-accent/40 transition">
        <span class="text-muted">
          <svg class="w-5 h-5">
            <use href="#i-plus" />
          </svg>
        </span>
        <input id="task-input" type="text" placeholder="what's next?" maxlength="140"
          class="flex-1 bg-transparent outline-none text-base placeholder:text-muted/70 py-1.5" required />

        <label
          class="relative grid place-items-center w-9 h-9 rounded-full text-muted hover:text-accent hover:bg-accentSoft/40 cursor-pointer transition"
          title="Set a deadline">
          <svg class="w-[18px] h-[18px]">
            <use href="#i-calendar" />
          </svg>
          <input id="deadline-input" type="datetime-local" class="absolute inset-0 opacity-0 cursor-pointer"
            aria-label="Deadline" />
        </label>

        <button type="submit"
          class="grid place-items-center w-9 h-9 rounded-full bg-ink text-bg hover:bg-accent transition disabled:opacity-30"
          aria-label="Add task">
          <svg class="w-[18px] h-[18px]">
            <use href="#i-arrow" />
          </svg>
        </button>
      </div>

      <div id="pending-deadline" class="hidden mt-2 ml-3 inline-flex items-center gap-1.5 text-xs text-warn">
        <svg class="w-3.5 h-3.5">
          <use href="#i-clock" />
        </svg>
        <span id="pending-deadline-label"></span>
        <button type="button" id="clear-deadline" class="ml-1 text-muted hover:text-danger"
          aria-label="Clear deadline">×</button>
      </div>
    </form>

    <nav class="mt-8 flex items-center gap-1 text-sm" role="tablist" aria-label="Filter tasks">
      <button data-filter="all" class="filter-chip" role="tab" aria-selected="true">all</button>
      <button data-filter="active" class="filter-chip" role="tab" aria-selected="false">active</button>
      <button data-filter="done" class="filter-chip" role="tab" aria-selected="false">done</button>

      <span class="flex-1"></span>

      <button id="clear-done" class="hidden text-xs text-muted hover:text-danger transition"
        aria-label="Clear completed tasks">
        clear done
      </button>
    </nav>

    <div id="picker-row" class="hidden mt-3">
      <button id="pick-btn"
        class="inline-flex items-center gap-1.5 text-sm text-muted hover:text-accent transition px-1 py-1"
        aria-label="Pick a random task for me">
        <svg class="w-4 h-4">
          <use href="#i-shuffle" />
        </svg>
        pick for me
      </button>
    </div>

    <ul id="task-list" class="mt-4 space-y-2.5" aria-live="polite"></ul>

    <div id="empty-state" class="hidden mt-12 text-center">
      <svg class="w-24 h-20 mx-auto text-subtle" aria-hidden="true">
        <use href="#i-empty" />
      </svg>
      <p class="mt-4 text-muted text-sm" id="empty-message">all clear. take a breath.</p>
    </div>

    <template id="task-template">
      <li
        class="task group flex items-start gap-3 px-3 sm:px-4 py-3 rounded-2xl bg-card border border-subtle shadow-soft hover:-translate-y-[1px] hover:shadow-[0_4px_16px_rgba(28,25,23,0.06)] transition">

        <button
          class="task-toggle mt-[3px] grid place-items-center w-5 h-5 rounded-full border border-subtle hover:border-accent transition shrink-0"
          aria-label="Mark complete">
          <svg class="check-icon w-3.5 h-3.5 text-card opacity-0 transition-opacity">
            <use href="#i-check" />
          </svg>
        </button>

        <div class="flex-1 min-w-0">
          <p class="task-text text-[15px] leading-snug break-words"></p>
          <p class="task-meta hidden mt-1 inline-flex items-center gap-1 text-xs">
            <svg class="meta-icon w-3 h-3">
              <use href="#i-clock" />
            </svg>
            <span class="meta-label"></span>
          </p>
        </div>

        <button
          class="task-delete opacity-0 group-hover:opacity-100 focus:opacity-100 grid place-items-center w-8 h-8 rounded-full text-muted hover:text-danger hover:bg-subtle/60 transition shrink-0"
          aria-label="Delete task">
          <svg class="w-4 h-4">
            <use href="#i-trash" />
          </svg>
        </button>
      </li>
    </template>

    <footer class="mt-16 text-center text-xs text-muted/80">
      "What you do today can improve all your tomorrows." — Ralph Marston
    </footer>
  </main>

  <script src="script.js" defer></script>
</body>

</html>
